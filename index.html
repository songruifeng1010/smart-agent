<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAgent - 智能对话助手</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      background-color: #f5f5f5;
      color: #333;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2em;
      opacity: 0.9;
    }
    
    .chat-container {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    
    .chat-messages {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
    }
    
    .message {
      margin-bottom: 15px;
      max-width: 80%;
      padding: 10px 15px;
      border-radius: 18px;
    }
    
    .user-message {
      background-color: #e3f2fd;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    
    .bot-message {
      background-color: #f1f0f0;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    
    .message-content {
      word-wrap: break-word;
    }
    
    .chat-input {
      display: flex;
      padding: 20px;
      border-top: 1px solid #e0e0e0;
      background-color: #fafafa;
    }
    
    #message-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 16px;
      resize: none;
    }
    
    #send-button {
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 0 20px;
      margin-left: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    
    #send-button:hover {
      background-color: #5a6fd8;
    }
    
    #send-button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .typing-indicator {
      display: flex;
      align-items: center;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background-color: #999;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }
    
    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      } 40% {
        transform: scale(1);
      }
    }
    
    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
    
    .copy-button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      margin-top: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .copy-button:hover {
      background-color: #e0e0e0;
      color: #333;
    }
    
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid #e0e0e0;
      background-color: #fafafa;
    }
    
    .quick-reply {
      background-color: #e3f2fd;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      color: #1976d2;
      transition: all 0.2s;
    }
    
    .quick-reply:hover {
      background-color: #bbdefb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SmartAgent</h1>
      <p class="subtitle">一个类似于DeepSeek的智能对话助手</p>
    </header>
    
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="message bot-message">
          <div class="message-content">你好！我是SmartAgent，一个智能对话助手。我能够理解并回答您的各种问题，提供准确且有用的信息。请问有什么可以帮助您的？</div>
        </div>
      </div>
      
      <div class="quick-replies" id="quick-replies">
        <button class="quick-reply" data-text="你好">你好</button>
        <button class="quick-reply" data-text="讲个笑话">讲个笑话</button>
        <button class="quick-reply" data-text="123 + 456">123 + 456</button>
        <button class="quick-reply" data-text="100厘米等于多少米">单位转换</button>
        <button class="quick-reply" data-text="32华氏度等于多少摄氏度">温度转换</button>
        <button class="quick-reply" data-text="什么是Python">Python介绍</button>
        <button class="quick-reply" data-text="你能做什么">功能介绍</button>
      </div>
      <div class="chat-input">
        <input type="text" id="message-input" placeholder="请输入您的问题..." autocomplete="off">
        <button id="send-button">发送</button>
      </div>
    </div>
    
    <div class="status">
      <span id="status-text">就绪</span>
    </div>
  </div>
  
  <script>
    // DOM元素
    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const statusText = document.getElementById('status-text');
    const quickRepliesContainer = document.getElementById('quick-replies');
    
    // 显示正在输入的提示
    let typingIndicator = null;
    
    function showTypingIndicator() {
      if (typingIndicator) return;
      
      typingIndicator = document.createElement('div');
      typingIndicator.className = 'message bot-message';
      typingIndicator.innerHTML = `
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages.appendChild(typingIndicator);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function removeTypingIndicator() {
      if (typingIndicator) {
        typingIndicator.remove();
        typingIndicator = null;
      }
    }
    
    // 获取当前时间格式化
    function getCurrentTime() {
      const now = new Date();
      return now.getHours().toString().padStart(2, '0') + ':' + 
             now.getMinutes().toString().padStart(2, '0');
    }
    
    // 发送消息
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      
      // 添加用户消息到聊天界面
      addMessage(message, 'user');
      messageInput.value = '';
      
      // 显示正在输入状态
      statusText.textContent = '正在思考...';
      sendButton.disabled = true;
      showTypingIndicator();
      
      try {
        // 调用API
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message })
        });
        
        if (!response.ok) {
          throw new Error('API请求失败');
        }
        
        const data = await response.json();
        // 移除正在输入提示
        removeTypingIndicator();
        // 添加机器人回复到聊天界面
        addMessage(data.response, 'bot');
      } catch (error) {
        console.error('Error:', error);
        removeTypingIndicator();
        addMessage('抱歉，我在处理您的请求时遇到了问题。', 'bot');
      } finally {
        // 恢复状态
        statusText.textContent = '就绪';
        sendButton.disabled = false;
      }
    }
    
    // 添加消息到聊天界面
    function addMessage(text, type) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}-message`;
      
      const time = getCurrentTime();
      messageDiv.innerHTML = `
        <div class="message-content">${text}</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
          <button class="copy-button" onclick="copyMessage(this)">📋 复制</button>
          <div style="font-size: 11px; color: #999;">${time}</div>
        </div>
      `;
      
      chatMessages.appendChild(messageDiv);
      // 滚动到底部，使用平滑滚动
      chatMessages.scrollTo({
        top: chatMessages.scrollHeight,
        behavior: 'smooth'
      });
    }
    
    // 复制消息内容
    function copyMessage(button) {
      const messageDiv = button.closest('.message');
      const content = messageDiv.querySelector('.message-content').textContent;
      
      navigator.clipboard.writeText(content).then(() => {
        const originalText = button.textContent;
        button.textContent = '✅ 已复制';
        setTimeout(() => {
          button.textContent = originalText;
        }, 2000);
      }).catch(err => {
        console.error('复制失败:', err);
      });
    }
    
    // 事件监听
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
    
    // 快速回复按钮事件
    quickRepliesContainer.addEventListener('click', (e) => {
      if (e.target.classList.contains('quick-reply')) {
        const text = e.target.getAttribute('data-text');
        messageInput.value = text;
        sendMessage();
      }
    });
    
    // 自动聚焦输入框
    messageInput.focus();
  </script>
</body>
</html>
